<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 178 40" fill="none" role="img" aria-label="oneulweb">
  <defs>
    <linearGradient id="markGrad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4F46E5"/>
      <stop offset="0.5" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="webGrad" x1="108" y1="8" x2="178" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4F46E5"/>
      <stop offset="0.45" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <filter id="markShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#4F46E5" flood-opacity="0.35"/>
    </filter>
  </defs>
  <!-- Symbol: today sun + web node -->
  <g filter="url(#markShadow)">
    <rect width="40" height="40" rx="11" fill="url(#markGrad)"/>
    <circle cx="20" cy="25" r="9" fill="#fff" fill-opacity="0.95"/>
    <path d="M11 25 Q20 17 29 25" stroke="#fff" stroke-opacity="0.5" stroke-width="1.2" fill="none"/>
    <circle cx="28" cy="13" r="3.5" fill="#F97316"/>
    <circle cx="28" cy="13" r="5.5" fill="none" stroke="#fff" stroke-width="1.5" stroke-opacity="0.85"/>
  </g>
  <!-- Wordmark -->
  <text x="50" y="27.5" fill="#1E293B" font-family="Outfit, ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="700" letter-spacing="-0.6">oneul</text>
  <text x="108" y="27.5" fill="url(#webGrad)" font-family="Outfit, ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="800" letter-spacing="-0.6">web</text>
</svg>
